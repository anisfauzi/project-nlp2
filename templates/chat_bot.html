<html>
<head>
<title>Chat Bot</title>
<style>
body {
	font-family: Arial, sans-serif;
	margin: 20px;
	background-color: #f5f5f5;
}
.text-center {
	text-align: center;
}
.text-green {
	color: green;
}
.chat-container {
	max-width: 600px;
	margin: 20px auto;
	background: #fff;
	border: 1px solid #ddd;
	border-radius: 8px;
	box-shadow: 0 2px 6px rgba(0,0,0,0.1);
	overflow: hidden;
	display: flex;
	flex-direction: column;
	height: 70vh;
}
.chat-header {
	background: green;
	color: #fff;
	padding: 12px 16px;
	font-weight: bold;
}
.chat-box {
	flex: 1;
	padding: 16px;
	overflow-y: auto;
	background: #fafafa;
}
.message {
	margin-bottom: 12px;
	display: flex;
}
.message.user {
	justify-content: flex-end;
}
.message .bubble {
	max-width: 75%;
	padding: 8px 12px;
	border-radius: 16px;
	line-height: 1.4;
	word-wrap: break-word;
}
.message.bot .bubble {
	background: #e8e8e8;
	color: #222;
	border-bottom-left-radius: 4px;
}
.message.user .bubble {
	background: green;
	color: #fff;
	border-bottom-right-radius: 4px;
}
.chat-input {
	display: flex;
	border-top: 1px solid #ddd;
	background: #fff;
}
.chat-input input {
	flex: 1;
	padding: 12px;
	border: none;
	outline: none;
	font-size: 14px;
}
.chat-input button {
	padding: 0 20px;
	background: green;
	color: #fff;
	border: none;
	cursor: pointer;
	font-weight: bold;
}
.chat-input button:hover {
	background: #006400;
}
.typing {
	font-style: italic;
	color: #888;
	font-size: 12px;
	padding: 0 16px 8px;
}
</style>
</head>
<body>
<a href="/">Kembali Ke Beranda</a>
<h1 class="text-center text-green">Chat Bot Qwen 2.5</h1>
<hr />

<div class="chat-container">
	<div class="chat-header">NLP Chat Bot</div>
	<div class="chat-box" id="chatBox">
		<div class="message bot">
			<div class="bubble">Halo! Saya Kurawa bot. Ada yang bisa saya bantu?</div>
		</div>
	</div>
	<div class="typing" id="typing" style="display:none;">Bot sedang mengetik...</div>
	<form class="chat-input" id="chatForm" onsubmit="return sendMessage(event)">
		<input type="text" id="userInput" placeholder="Tulis pesan..." autocomplete="off" required />
		<button type="submit">Kirim</button>
	</form>
</div>

<script>
function appendMessage(text, sender) {
	var chatBox = document.getElementById('chatBox');
	var msg = document.createElement('div');
	msg.className = 'message ' + sender;
	var bubble = document.createElement('div');
	bubble.className = 'bubble';
	bubble.textContent = text;
	msg.appendChild(bubble);
	chatBox.appendChild(msg);
	chatBox.scrollTop = chatBox.scrollHeight;
}

function sendMessage(event) {
	event.preventDefault();
	var input = document.getElementById('userInput');
	var text = input.value.trim();
	if (!text) return false;

	appendMessage(text, 'user');
	input.value = '';

	var typing = document.getElementById('typing');
	typing.style.display = 'block';

	fetch('/chat_bot/reply', {
		method: 'POST',
		headers: { 'Content-Type': 'application/json' },
		body: JSON.stringify({ message: text })
	})
	.then(function(res) { return res.json(); })
	.then(function(data) {
		typing.style.display = 'none';
		appendMessage(data.reply || '(tidak ada balasan)', 'bot');
	})
	.catch(function() {
		typing.style.display = 'none';
		appendMessage('Maaf, terjadi kesalahan.', 'bot');
	});

	return false;
}
</script>
</body>
</html>
